<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | Mayalu Crafts</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- HEADER -->

<header>

    <div class="container navbar">

        <a href="index.html" class="logo">
            Mayalu <span>Crafts</span>
        </a>

        <nav class="nav-links">

            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="contact.html">Contact</a>

            <a href="cart.html">
                Cart
                <span class="cart-count">0</span>
            </a>

        </nav>

    </div>

</header>

<!-- PRODUCT DETAILS -->

<section class="section">

    <div class="container">

        <div id="product-details" class="product-details"></div>

    </div>

</section>

<!-- RELATED PRODUCTS -->

<section class="section">

    <div class="container">

        <div class="section-title">

            <h2>You May Also Like</h2>

            <p>More handmade products you'll love.</p>

        </div>

        <div id="related-products" class="products-grid"></div>

    </div>

</section>

<!-- NEWSLETTER -->

<section class="section">

    <div class="container">

        <div class="newsletter">

            <h2>Join The Mayalu Family</h2>

            <p>Be first to know about new handmade creations and special offers.</p>

            <form id="newsletter-form">

                <input type="email" placeholder="Enter your email" required>

                <button type="submit" class="btn btn-secondary">
                    Subscribe
                </button>

            </form>

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <div class="container">

        <div class="footer-content">

            <h3>Mayalu Crafts</h3>

            <p>Handmade with creativity and love.</p>

            <br>

            <p>© 2026 Mayalu Crafts. All Rights Reserved.</p>

        </div>

    </div>

</footer>

<div id="toast" class="toast"></div>

<script src="js/script.js"></script>

<script>

const params =
    new URLSearchParams(window.location.search);

const productId =
    parseInt(params.get("id"));

const product =
    products.find(p => p.id === productId);

const container =
    document.getElementById("product-details");

if (product) {

    let stockText = "";

    if (product.stock === 0) {
        stockText = `<span style="color:red;font-weight:bold;">SOLD OUT</span>`;
    } 
    else if (product.stock <= 5) {
        stockText = `<span style="color:orange;font-weight:bold;">Only ${product.stock} Left</span>`;
    } 
    else {
        stockText = `<span style="color:green;font-weight:bold;">In Stock</span>`;
    }

    container.innerHTML = `
    
    <div class="product-gallery">
        <img src="${product.image}" alt="${product.name}">
    </div>

    <div class="product-content">

        <span class="badge badge-featured">Handmade</span>

        <h1>${product.name}</h1>

        <h2 class="product-price">Rs ${product.price}</h2>

        <p class="product-desc">${product.description}</p>

        <br>

        <p><strong>Status:</strong> ${stockText}</p>

        <br>

        <p><strong>Category:</strong> ${product.category}</p>

        <br>

        <button
            class="btn btn-primary"
            onclick="addToCart(${product.id})"
            ${product.stock === 0 ? "disabled" : ""}
        >
            ${product.stock === 0 ? "Sold Out" : "Add To Cart"}
        </button>

        <a href="cart.html" class="btn btn-secondary" style="margin-left:10px;">
            View Cart
        </a>

    </div>

    `;
}

/* RELATED PRODUCTS */

const related =
    document.getElementById("related-products");

products
.filter(p => p.id !== productId)
.slice(0, 4)
.forEach(p => {

    related.innerHTML += `

    <div class="product-card">

        <div class="product-image">
            <img src="${p.image}" alt="${p.name}">
        </div>

        <div class="product-info">

            <h3>${p.name}</h3>

            <div class="product-price">
                Rs ${p.price}
            </div>

            <a href="product.html?id=${p.id}" class="btn btn-primary">
                View Product
            </a>

        </div>

    </div>

    `;

});

</script>

</body>
</html>
